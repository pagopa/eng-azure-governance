    target_path: .github/skills/obra-brainstorming/SKILL.md
    source_family: obra/superpowers
    lifecycle_mode: post-refresh-patch
    apply_strategy: git-apply-3way
    approval: explicit-user-counter-validated
    reason: >-
      Narrow brainstorming to creative or design-ambiguous work and align
      transient spec artifacts to tmp/superpowers.
    patch_path: patches/obra-brainstorming.patch
    expected_content_hash: 9e0c6c59b1138312f6cff04f33f4e56e51b442a1df68f3cf04d1a5d276e4a101
    baseline_repo_commit: "5930521"
