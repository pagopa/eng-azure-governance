version: 1
policy:
  default_rule: keep imported upstream assets verbatim
  exception_rule: >-
    Allow a direct imported-asset override only for a strong repo-specific need
    that the user explicitly counter-validates, then register the replay patch
    in this bundle before treating the override as active.
  replay_rule: >-
    Prefer a clean patch replay first, then allow a registered `git apply
    --3way` fallback when upstream text drift is compatible. Stop for review if
    neither path applies cleanly.
overrides:
